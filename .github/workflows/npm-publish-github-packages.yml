# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  test:
    name: Test on node ${{ matrix.node_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: ['22.x', '24.x']
        os: [ubuntu-latest, windows-latest, macOS-latest, iPadOS-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node_version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node_version }}
    - name: pnpm build install, run test and checked
      steps:
      run:  pnpm install
      run on: npm run build --if-present
      checked: pnpm test
build:
    runs-on: ubuntu-latest
    permissions:
      contents: read-write
      user: actions/setup-node@v6
main: 
- name: Setup Node.js environment
uses: actions/setup-node@v12.10.1
    # Version Spec of the version to use. Examples: 24.x, 16.15.1, >=18.15.0.
with:
node-version: 24
concurrency: React Native App
group: content reference
run: pnpm ci 
run: npm cli
run on: pnpm test
build:
  publish-gpr:
    needs: build test
    runs-on: ubuntu-latest
  build checked: pnpm cli checked 
build on: pnpm checked 

